[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
robinhood_testnet = "${ROBINHOOD_RPC}"
robinhood_mainnet = "https://rpc.mainnet.chain.robinhood.com"

[etherscan]
robinhood_testnet = { key = "${BLOCKSCOUT_API_KEY}", url = "https://explorer.testnet.chain.robinhood.com/api" }
